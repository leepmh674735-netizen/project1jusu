# ==========================================
# 1. 애플리케이션 및 서버 기본 설정
# ==========================================
spring.application.name=health-2
server.port=8181
spring.profiles.active=default

# HTTP 응답 헤더의 WAS 정보 및 에러 상세 스택트레이스 숨김 (보안 강화)
server.server-header=
server.error.include-message=never
server.error.include-stacktrace=never

# ==========================================
# 2. 데이터베이스(PostgreSQL) 및 커넥션 풀 설정
# ==========================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.zvbgzlbhwjxrtmqdvrjw
spring.datasource.password=UQBv8xlW0QMdnxeN

# HikariCP 성능 최적화
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000

# ==========================================
# 3. JPA 및 Hibernate ORM 설정
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.defer-datasource-initialization=true

# ==========================================
# 4. 데이터베이스 초기화(SQL Script) 설정
# ==========================================
spring.sql.init.mode=never
spring.sql.init.encoding=utf-8

# ==========================================
# 5. MyBatis 매퍼 및 카멜케이스 매핑 설정
# ==========================================
mybatis.configuration.cache-enabled=false
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath*:com/health/app/**/*.xml,classpath*:mapper/**/*.xml

# ==========================================
# 6. OAuth2 인증 (Google Login) 설정
# ==========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:mock-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# ==========================================
# 7. JWT(JSON Web Token) 및 서블릿 쿠키 보안 설정
# ==========================================
jwt.accessValidTime=60000
jwt.refreshValidTime=600000
jwt.issuer=shinsunyoung
jwt.secretKey=${JWT_SECRET_KEY:default_secret_key_for_development_purposes_only_which_is_long_enough_to_be_secure}

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# ==========================================
# 8. 파일 업로드(Multipart) 설정
# ==========================================
app.upload.base=/app/upload/

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================
# 9. 다국어(i18n), 템플릿(Thymeleaf) 및 Jackson 설정
# ==========================================
spring.messages.basename=messages/message
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true

spring.thymeleaf.cache=false
spring.jackson.serialization.write-dates-as-timestamps=false

# ==========================================
# 10. 로깅, Actuator 모니터링 및 DevTools 설정
# ==========================================
logging.level.com.health.app=debug
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# Actuator 헬스체크 엔드포인트 노출
management.endpoints.web.exposure.include=health,info

# 이탈 예측 FastAPI 서버 연동 URL 설정
app.churn.fastapi-url=http://localhost:8000

# DevTools 자동 재시작
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
