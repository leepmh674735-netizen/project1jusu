spring.application.name=health-2

# ==========================================
# [서버 구동 및 프로필 설정]
# ==========================================
server.port=8181
spring.profiles.active=default

# HTTP 응답 헤der에서 WAS 정보(Tomcat 등)를 숨겨 OS/엔진 버전 유출 방지
server.server-header=

# 예외 발생 시 보안을 위해 상세 스택트레이스 및 에러 메시지 화면 노출 차단
server.error.include-message=never
server.error.include-stacktrace=never

# ==========================================
# [데이터베이스 및 커넥션 풀 설정]
# ==========================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.zvbgzlbhwjxrtmqdvrjw
spring.datasource.password=UQBv8xlW0QMdnxeN

# HikariCP 성능 최적화
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000

# JPA & Hibernate 구동 설정
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.defer-datasource-initialization=true

# 운영 환경 데이터 보호를 위한 SQL 초기화 차단
spring.sql.init.mode=never
spring.sql.init.encoding=utf-8

# MyBatis 설정
mybatis.configuration.cache-enabled=false
mybatis.mapper-locations=classpath:mappers/**/*.xml

# ==========================================
# [인증, 인가 및 보안 (OAuth2 & JWT)]
# ==========================================
# Google OAuth2 Client
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:mock-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# JWT 토큰 관리 (기본값 비워둠으로써 환경변수 주입 강제)
jwt.accessValidTime=60000
jwt.refreshValidTime=600000
jwt.issuer=shinsunyoung
jwt.secretKey=${JWT_SECRET_KEY}

# 세션 및 쿠키 보안 (주의: secure=true인 경우 로컬 HTTP 환경에서 쿠키가 구동되지 않을 수 있음)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# ==========================================
# [파일 업로드 및 인프라]
# ==========================================
# 파일 업로드 경로 (Linux/운영 환경 기준 경로)
app.upload.base=/app/upload/

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================
# [다국어(i18n) 및 뷰 설정]
# ==========================================
# 다국어 메시지 파일 경로 (src/main/resources/messages/message.properties 기준)
spring.messages.basename=messages/message
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true

spring.thymeleaf.cache=false
spring.jackson.serialization.write-dates-as-timestamps=false

# ==========================================
# [로깅 및 모니터링 엔드포인트]
# ==========================================
logging.level.me.shinsunyoung.springbootdeveloper=debug
logging.level.com.winter=debug
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# 모니터링 툴(Actuator) 정보 유출 최소화
management.endpoints.web.exposure.include=health,info

# ==========================================
# [개발 편의 기능 (DevTools)]
# ==========================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true