spring:
    application:
        name: app

    profiles:
        include: dev

    datasource:
        url: ${DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0}
        username: ${DB_USERNAME:postgres.zvbgzlbhwjxrtmqdvrjw}
        password: ${DB_PASSWORD:UQBv8xlW0QMdnxeN}
        driver-class-name: org.postgresql.Driver
        hikari:
            data-source-properties:
                # test또는 대량 insert시 cash충돌 해결방법
                prepareThreshold: 0

    servlet:
        multipart:
            # multipart 사용여부
            enabled: true
            # 파일 하나당 최대크기 설정
            max-file-size: 10MB
            # 총 파일의 최대크기 설정
            max-request-size: 100MB

app:
    server:
        backend-url: ${BACKEND_SERVER_URL:http://localhost:8181}
        frontend-url: ${FRONTEND_SERVER_URL:http://localhost:3000}
    upload:
        # 파일을 저장 관리
        base: C:/upload/health
        # 클라이언트가 파일을 달라고할때 여기서 찾아줘라 라는 경로
        path: file:///C:/upload/health/
        # 파일에 접근하기위한 가상의 URI 만들기 위에가서찾으세요
        url: /files/**

mybatis:
    mapper-locations: classpath:com/health/app/**/*.xml
    type-aliases-package: com.health.app
    configuration:
        map-underscore-to-camel-case: true

jwt:
    secret: ${JWT_SECRET_KEY:default_secret_key_for_development_purposes_only_which_is_long_enough_to_be_secure}

# AI 비서 (Anthropic Messages API) 설정
# 실제 키는 환경변수 ANTHROPIC_API_KEY로 주입 (아래 기본값은 개발용 placeholder - 실 키를 git에 커밋 금지)
anthropic:
    api-key: ${ANTHROPIC_API_KEY:sk-ant-api03-PLACEHOLDER-REPLACE-WITH-REAL-KEY}
    model: ${ANTHROPIC_MODEL:claude-sonnet-5}
